<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户主页 - 电影推荐系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }
    .header {
      background-color: #000000;
      color: #ffffff;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 24px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .logout-btn {
      padding: 8px 16px;
      background-color: #ffffff;
      color: #000000;
      border: 2px solid #ffffff;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover {
      background-color: #000000;
      color: #ffffff;
    }
    .container {
      max-width: 1400px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .welcome-card {
      background-color: #ffffff;
      border: 3px solid #000000;
      padding: 30px;
      margin-bottom: 30px;
    }
    .welcome-card h2 {
      margin-bottom: 15px;
      color: #000000;
    }
    .welcome-card p {
      font-size: 16px;
      line-height: 1.6;
      color: #333333;
    }
    .role-badge {
      display: inline-block;
      padding: 5px 12px;
      background-color: #000000;
      color: #ffffff;
      font-size: 14px;
      font-weight: bold;
      border-radius: 4px;
      margin-left: 10px;
    }
    .recommend-section {
      margin-bottom: 40px;
    }
    .recommend-scroll {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding-bottom: 15px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .recommend-scroll::-webkit-scrollbar {
      height: 8px;
    }
    .recommend-scroll::-webkit-scrollbar-track {
      background: #f0f0f0;
      border-radius: 4px;
    }
    .recommend-scroll::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 4px;
    }
    .recommend-scroll::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
    .recommend-card {
      flex: 0 0 200px;
      background-color: #ffffff;
      border: 2px solid #000000;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      scroll-snap-align: start;
    }
    .recommend-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
    .recommend-card .movie-cover {
      height: 260px;
    }
    .recommend-card .movie-info {
      padding: 12px;
    }
    .recommend-card .movie-title {
      font-size: 14px;
      margin-bottom: 6px;
    }
    .recommend-badge {
      display: inline-block;
      padding: 3px 8px;
      background-color: #ff9800;
      color: #ffffff;
      font-size: 11px;
      font-weight: bold;
      border-radius: 4px;
      margin-top: 4px;
    }
    .section-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #000000;
    }
    .section-subtitle {
      font-size: 14px;
      color: #888;
      font-weight: normal;
      margin-left: 10px;
    }
    .recommend-loading {
      text-align: center;
      padding: 30px;
      font-size: 16px;
      color: #666;
    }
    .recommend-empty {
      text-align: center;
      padding: 30px;
      font-size: 16px;
      color: #999;
      background-color: #ffffff;
      border: 2px dashed #ccc;
      border-radius: 8px;
    }
    .recommend-error {
      text-align: center;
      padding: 30px;
      font-size: 16px;
      color: #d32f2f;
    }
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
      margin-bottom: 30px;
    }
    .movie-card {
      background-color: #ffffff;
      border: 2px solid #000000;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .movie-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
    .movie-cover {
      width: 100%;
      height: 300px;
      object-fit: cover;
      background-color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999999;
      font-size: 14px;
    }
    .movie-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .movie-info {
      padding: 15px;
    }
    .movie-title {
      font-size: 16px;
      font-weight: bold;
      color: #000000;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .movie-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: #666666;
    }
    .movie-year {
      background-color: #f0f0f0;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .movie-rating {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #ff9800;
      font-weight: bold;
    }
    .star-icon {
      font-size: 16px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 18px;
      color: #666666;
    }
    .error-message {
      text-align: center;
      padding: 40px;
      font-size: 18px;
      color: #d32f2f;
    }
    .no-movies {
      text-align: center;
      padding: 60px;
      font-size: 18px;
      color: #666666;
      background-color: #ffffff;
      border: 2px solid #000000;
      border-radius: 8px;
    }
    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }
    .pagination button {
      padding: 8px 16px;
      background-color: #ffffff;
      color: #000000;
      border: 2px solid #000000;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .pagination button:hover:not(:disabled) {
      background-color: #000000;
      color: #ffffff;
    }
    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .pagination .current-page {
      background-color: #000000;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>电影推荐系统</h1>
    <div class="user-info">
      <span id="usernameDisplay"></span>
      <button class="logout-btn" id="logoutBtn">退出登录</button>
    </div>
  </div>

  <div class="container">
    <div class="welcome-card">
      <h2>欢迎回来 <span id="welcomeUsername"></span><span class="role-badge">普通用户</span></h2>
      <p>欢迎使用电影推荐系统，浏览精彩电影，享受观影体验！</p>
    </div>

    <!-- 推荐电影区域 -->
    <div class="recommend-section" id="recommendSection">
      <h3 class="section-title">
        推荐给你
        <span class="section-subtitle">基于你的观影偏好，AI 智能推荐</span>
      </h3>
      <div id="recommendContainer">
        <div class="recommend-loading">🎬 正在为你生成个性化推荐...</div>
      </div>
    </div>

    <h3 class="section-title">电影列表</h3>
    <div id="moviesContainer" class="movies-grid">
      <div class="loading">加载中...</div>
    </div>
    
    <div id="pagination" class="pagination"></div>
  </div>

  <script>
    // 后端接口地址
    const API_BASE = `http://${window.location.hostname}:3000/api`;

    // 当前页码
    let currentPage = 1;
    const pageSize = 15;
    let totalPages = 1;

    // 检查是否登录
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser) {
      window.location.href = '/index.html';
    } else {
      // 如果是管理员，跳转到管理页面
      if (currentUser.role_id === 1) {
        window.location.href = '/user-management.html';
      }
      document.getElementById('usernameDisplay').textContent = currentUser.username;
      document.getElementById('welcomeUsername').textContent = currentUser.username;
    }

    // 退出登录
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('currentUser');
      window.location.href = '/index.html';
    });

    // 加载电影列表
    async function loadMovies(page = 1) {
      const container = document.getElementById('moviesContainer');
      container.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const response = await fetch(`${API_BASE}/movies?page=${page}&limit=${pageSize}`);
        const data = await response.json();

        if (data.success) {
          const { movies, pagination } = data.data;
          totalPages = pagination.totalPages;
          currentPage = page;

          if (movies.length === 0) {
            container.innerHTML = '<div class="no-movies">暂无电影数据</div>';
          } else {
            renderMovies(movies);
            renderPagination();
          }
        } else {
          container.innerHTML = `<div class="error-message">${data.message || '加载失败'}</div>`;
        }
      } catch (error) {
        console.error('加载电影失败:', error);
        container.innerHTML = '<div class="error-message">网络错误，请确保后端服务已启动</div>';
      }
    }

    // 渲染电影卡片
    function renderMovies(movies) {
      const container = document.getElementById('moviesContainer');
      container.innerHTML = movies.map(movie => `
        <div class="movie-card" onclick="goToMovieDetail(${movie.id})">
          <div class="movie-cover">
            ${movie.cover_url 
              ? `<img src="${movie.cover_url}" alt="${movie.title}" onerror="this.parentElement.innerHTML='暂无封面'">`
              : '暂无封面'
            }
          </div>
          <div class="movie-info">
            <div class="movie-title" title="${movie.title}">${movie.title}</div>
            <div class="movie-meta">
              <span class="movie-year">${movie.release_year || '未知'}</span>
              <span class="movie-rating">
                <span class="star-icon">★</span>
                ${parseFloat(movie.avg_rating).toFixed(1) || '暂无'}
              </span>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 渲染分页
    function renderPagination() {
      const paginationContainer = document.getElementById('pagination');
      let html = '';

      // 上一页
      html += `<button onclick="loadMovies(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;

      // 页码
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
          html += `<button class="${i === currentPage ? 'current-page' : ''}" onclick="loadMovies(${i})">${i}</button>`;
        } else if (i === currentPage - 2 || i === currentPage + 2) {
          html += `<span style="padding: 8px">...</span>`;
        }
      }

      // 下一页
      html += `<button onclick="loadMovies(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;

      paginationContainer.innerHTML = html;
    }

    // 跳转到电影详情页
    function goToMovieDetail(movieId) {
      window.location.href = `/movie-detail.html?id=${movieId}`;
    }

    // =============================================
    // 推荐电影（Hybrid 推荐）
    // =============================================

    async function loadRecommendations() {
      const container = document.getElementById('recommendContainer');
      container.innerHTML = '<div class="recommend-loading">🎬 正在为你生成个性化推荐...</div>';

      // 从 localStorage 获取当前用户的 user_id
      const userId = currentUser.id;

      try {
        // 调用 Hybrid 推荐 API（超时 180 秒）
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 180000);

        const response = await fetch(
          `${API_BASE}/recommend/hybrid/${userId}?k=20&topN=10&userWeight=0.5`,
          { signal: controller.signal }
        );
        clearTimeout(timeoutId);

        const data = await response.json();

        if (data.success && data.data.recommendations.length > 0) {
          renderRecommendations(data.data.recommendations);
        } else {
          container.innerHTML = `<div class="recommend-empty">暂无个性化推荐，快去评分一些电影吧！🎥</div>`;
        }
      } catch (error) {
        console.error('加载推荐失败:', error);
        if (error.name === 'AbortError') {
          container.innerHTML = '<div class="recommend-error">⏰ 推荐请求超时，请稍后再试</div>';
        } else {
          container.innerHTML = '<div class="recommend-error">😿 推荐服务暂时不可用，请稍后再试</div>';
        }
      }
    }

    function renderRecommendations(recommendations) {
      const container = document.getElementById('recommendContainer');

      const html = `
        <div class="recommend-scroll">
          ${recommendations.map(movie => `
            <div class="recommend-card" onclick="goToMovieDetail(${movie.movieId})">
              <div class="movie-cover">
                ${movie.coverUrl
                  ? `<img src="${movie.coverUrl}" alt="${movie.title}" onerror="this.parentElement.innerHTML='暂无封面'" style="width:100%;height:100%;object-fit:cover">`
                  : '暂无封面'
                }
              </div>
              <div class="movie-info">
                <div class="movie-title" title="${movie.title}">${movie.title}</div>
                <div style="display:flex;justify-content:space-between;font-size:12px;color:#888;">
                  <span>${movie.releaseYear || '未知'}</span>
                  <span>★ ${movie.predictedRating || movie.avgRating || '?'}</span>
                </div>
                <span class="recommend-badge">
                  推荐度 ${((movie.predictedRating || movie.avgRating || 0) / 5 * 100).toFixed(0)}%
                </span>
              </div>
            </div>
          `).join('')}
        </div>
      `;

      container.innerHTML = html;
    }

    // 页面加载时：先加载推荐，再加载电影列表
    loadRecommendations();
    loadMovies(1);
  </script>
</body>
</html>
