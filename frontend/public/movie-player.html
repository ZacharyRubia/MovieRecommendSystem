<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电影播放 - 电影推荐系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
    .header { background: #111; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .back-btn { padding: 10px 24px; background: #333; color: #fff; border: 1px solid #444; border-radius: 6px; font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .back-btn:hover { background: #444; border-color: #555; }
    .player-container { max-width: 1600px; margin: 0 auto; padding: 20px; }
    .movie-title { font-size: 28px; font-weight: 600; margin-bottom: 20px; text-align: center; }
    .video-wrapper { position: relative; width: 100%; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    video { width: 100%; display: block; max-height: 85vh; background: #000; }
    .controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 25px 20px; display: flex; align-items: center; gap: 15px; opacity: 0; transition: opacity 0.3s; }
    .video-wrapper:hover .controls { opacity: 1; }
    .control-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 8px; border-radius: 50%; transition: all 0.2s; }
    .control-btn:hover { background: rgba(255,255,255,0.1); color: #ff9800; }
    .progress-container { flex: 1; position: relative; }
    .progress-bar { width: 100%; height: 6px; background: #444; border-radius: 3px; cursor: pointer; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #ff9800, #ff5722); border-radius: 3px; width: 0%; transition: width 0.1s; }
    .time-display { font-size: 14px; min-width: 120px; text-align: center; font-family: monospace; }
    .fullscreen-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 8px; border-radius: 50%; transition: all 0.2s; }
    .fullscreen-btn:hover { background: rgba(255,255,255,0.1); color: #ff9800; }
    .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    .spinner { width: 60px; height: 60px; border: 4px solid #333; border-top: 4px solid #ff9800; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { font-size: 18px; color: #aaa; }
    .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; cursor: pointer; opacity: 0.8; transition: all 0.2s; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .play-overlay:hover { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    .info-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #1a1a1a; border-radius: 8px; margin-top: 15px; flex-wrap: wrap; gap: 10px; }
    .format-info { font-size: 14px; color: #aaa; }
    .hardware-badge { padding: 4px 12px; background: #4caf50; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .transcoding-badge { background: #ff9800; }
    .volume-control { display: flex; align-items: center; gap: 8px; }
    .volume-slider { width: 80px; height: 4px; -webkit-appearance: none; appearance: none; background: #444; border-radius: 2px; cursor: pointer; }
    .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #ff9800; border-radius: 50%; }
    :fullscreen .video-wrapper, :fullscreen video { width: 100vw; height: 100vh; max-height: none; border-radius: 0; }
    :-webkit-full-screen .video-wrapper, :-webkit-full-screen video { width: 100vw; height: 100vh; max-height: none; border-radius: 0; }
    .speed-selector { padding: 6px 12px; background: #333; color: #fff; border: 1px solid #444; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .speed-selector:hover { background: #444; }
    .transcode-switch { display: flex; align-items: center; gap: 8px; }
    .switch { position: relative; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #ff9800; }
    input:checked + .slider:before { transform: translateX(20px); }
    .error-container { text-align: center; padding: 80px 40px; }
    .error-icon { font-size: 64px; margin-bottom: 20px; }
    .error-text { font-size: 20px; color: #f44336; margin-bottom: 10px; }
    .error-detail { font-size: 14px; color: #666; }
    .retry-btn { margin-top: 20px; padding: 10px 30px; background: #ff9800; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <h1 id="movieTitle">电影播放</h1>
    <button class="back-btn" onclick="goBack()">返回详情</button>
  </div>

  <div class="player-container">
    <div id="playerContent">
      <div class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">正在加载电影...</div>
        <div class="loading-subtext" id="loadingSubtext">准备播放器</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = `http://${window.location.hostname}:3000/api`;
    const movieId = new URLSearchParams(window.location.search).get('id');
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    
    if (!currentUser) window.location.href = '/index.html';

    let video = null;
    let isPlaying = false;
    let currentTime = 0;
    let duration = 0;
    let useTranscode = localStorage.getItem('useTranscode') === 'true';
    let ffmpegAvailable = false;
    let currentFilename = '';
    let currentTitle = '';

    function goBack() { window.location.href = `/movie-detail.html?id=${movieId}`; }

    async function checkFFmpegStatus() {
      try {
        const res = await fetch(`${API_BASE}/transcode/status/ffmpeg`);
        const data = await res.json();
        ffmpegAvailable = data.ffmpegAvailable;
        return data.ffmpegAvailable;
      } catch (e) {
        return false;
      }
    }

    function needsTranscode(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      return ['mkv', 'avi', 'wmv', 'flv', 'mov'].includes(ext);
    }

    function getFormatInfo(ext) {
      const formats = {
        'mp4': 'MP4 (H.264/AAC)',
        'mkv': 'MKV Matroska',
        'avi': 'AVI',
        'mov': 'QuickTime MOV',
        'wmv': 'Windows Media',
        'flv': 'Flash Video',
        'webm': 'WebM',
        'm4v': 'M4V'
      };
      return formats[ext] || ext.toUpperCase();
    }

    function toggleTranscode() {
      useTranscode = !useTranscode;
      localStorage.setItem('useTranscode', useTranscode);
      initPlayer(currentFilename, currentTitle);
    }

    async function loadMovie() {
      const container = document.getElementById('playerContent');
      try {
        const res = await fetch(`${API_BASE}/movies/${movieId}`);
        const data = await res.json();
        
        if (data.success && data.data.video_url) {
          document.getElementById('movieTitle').textContent = data.data.title;
          currentTitle = data.data.title;
          document.getElementById('loadingSubtext').textContent = '检测转码服务...';
          
          await checkFFmpegStatus();
          
          const videoUrl = data.data.video_url;
          currentFilename = videoUrl;
          await initPlayer(videoUrl, data.data.title);
        } else {
          container.innerHTML = `
            <div class="error-container">
              <div class="error-icon">⚠️</div>
              <div class="error-text">该电影暂无播放资源</div>
              <div class="error-detail">请联系管理员添加视频文件</div>
            </div>`;
        }
      } catch (error) {
        console.error('加载失败:', error);
        container.innerHTML = `
          <div class="error-container">
            <div class="error-icon">❌</div>
            <div class="error-text">加载失败</div>
            <div class="error-detail">网络错误，请确保后端服务已启动</div>
          </div>`;
      }
    }

    async function initPlayer(videoUrl, title) {
      const container = document.getElementById('playerContent');
      
      let fullUrl = videoUrl;
      let filename = videoUrl.split('/').pop();
      
      if (!videoUrl.startsWith('http')) {
        if (videoUrl.startsWith('/api/media/') || videoUrl.startsWith('/videos/')) {
          fullUrl = videoUrl;
        } else {
          fullUrl = `/api/media/${filename}`;
        }
      }

      const ext = filename.split('.').pop().toLowerCase();
      const needTranscode = needsTranscode(filename);
      
      let playUrl = fullUrl;
      let badgeClass = 'hardware-badge';
      let badgeText = '原生播放';
      let formatText = `格式: ${getFormatInfo(ext)}`;
      let showTranscodeSwitch = needTranscode && ffmpegAvailable;

      if (needTranscode) {
        if (ffmpegAvailable && useTranscode) {
          playUrl = `/api/transcode/${filename}`;
          badgeClass = 'transcoding-badge';
          badgeText = '实时转码';
          formatText += ' - 服务端实时转码播放中';
        } else if (ffmpegAvailable) {
          formatText += ' - MKV 格式可启用实时转码';
        } else {
          formatText += ' - 提示：如无法播放，请安装 FFmpeg 启用服务端转码';
        }
      }

      container.innerHTML = `
        <h2 class="movie-title">${title}</h2>
        <div class="video-wrapper" id="videoWrapper">
          <video id="videoPlayer" playsinline webkit-playsinline></video>
          <div class="loading-overlay" id="videoLoading" style="display: flex;">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingStatus">正在加载视频...</div>
          </div>
          <div class="play-overlay" id="playOverlay" onclick="togglePlay()" style="display: none;">▶</div>
          <div class="controls">
            <button class="control-btn" id="playBtn" onclick="togglePlay()">▶</button>
            <div class="volume-control">
              <button class="control-btn" id="muteBtn" onclick="toggleMute()" style="font-size: 18px;">🔊</button>
              <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="1" oninput="setVolume(this.value)">
            </div>
            <div class="progress-container">
              <div class="progress-bar" id="progressBar" onclick="seekVideo(event)">
                <div class="progress-fill" id="progressFill"></div>
              </div>
            </div>
            <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
            <select class="speed-selector" id="speedSelector" onchange="setPlaybackRate(this.value)">
              <option value="0.5">0.5x</option>
              <option value="0.75">0.75x</option>
              <option value="1" selected>1x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
              <option value="2">2x</option>
            </select>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
          </div>
        </div>
        <div class="info-bar">
          <span class="format-info" id="formatInfo">${formatText}</span>
          <div style="display: flex; align-items: center; gap: 15px;">
            ${showTranscodeSwitch ? `
              <label class="transcode-switch">
                <span style="font-size: 13px;">实时转码</span>
                <label class="switch">
                  <input type="checkbox" id="transcodeToggle" ${useTranscode ? 'checked' : ''} onchange="toggleTranscode()">
                  <span class="slider"></span>
                </label>
              </label>
            ` : ''}
            <span class="hardware-badge ${badgeClass}" id="hardwareBadge">${badgeText}</span>
          </div>
        </div>`;

      video = document.getElementById('videoPlayer');
      
      video.addEventListener('timeupdate', updateProgress);
      video.addEventListener('loadedmetadata', onVideoLoaded);
      video.addEventListener('play', onPlay);
      video.addEventListener('pause', onPause);
      video.addEventListener('ended', onEnded);
      video.addEventListener('error', onVideoError);
      video.addEventListener('waiting', function() {
        document.getElementById('playOverlay').style.display = 'none';
      });
      video.addEventListener('canplay', function() {
        if (!isPlaying) {
          document.getElementById('playOverlay').style.display = 'block';
        }
      });

      video.src = playUrl;
      video.load();
    }

    function onVideoLoaded() {
      duration = video.duration;
      updateTimeDisplay();
      document.getElementById('playOverlay').style.display = 'block';
      var loading = document.getElementById('videoLoading');
      if (loading) loading.style.display = 'none';
    }

    function onVideoError(e) {
      console.error('视频播放错误:', e);
      var loading = document.getElementById('videoLoading');
      if (loading) {
        loading.innerHTML = '<div class="error-icon">⚠️</div><div class="error-text">播放失败</div><div class="error-detail">视频格式可能不受支持，建议安装 FFmpeg 启用转码</div><button class="retry-btn" onclick="loadMovie()">重试</button>';
      }
    }

    function togglePlay() {
      if (!video) return;
      if (video.paused) {
        video.play().catch(function(e) { console.log('播放失败:', e); });
      } else {
        video.pause();
      }
    }

    function onPlay() {
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸';
      document.getElementById('playOverlay').style.display = 'none';
    }

    function onPause() {
      isPlaying = false;
      document.getElementById('playBtn').textContent = '▶';
      document.getElementById('playOverlay').style.display = 'block';
    }

    function onEnded() {
      isPlaying = false;
      document.getElementById('playBtn').textContent = '▶';
      document.getElementById('playOverlay').style.display = 'block';
    }

    function updateProgress() {
      if (!video) return;
      currentTime = video.currentTime;
      var progress = (currentTime / duration) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
      updateTimeDisplay();
    }

    function updateTimeDisplay() {
      if (!video) return;
      var current = formatTime(video.currentTime);
      var total = formatTime(video.duration);
      document.getElementById('timeDisplay').textContent = current + ' / ' + total;
    }

    function formatTime(seconds) {
      if (isNaN(seconds)) return '0:00';
      var hours = Math.floor(seconds / 3600);
      var mins = Math.floor((seconds % 3600) / 60);
      var secs = Math.floor(seconds % 60);
      if (hours > 0) {
        return hours + ':' + String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
      }
      return mins + ':' + String(secs).padStart(2, '0');
    }

    function seekVideo(event) {
      if (!video) return;
      var progressBar = document.getElementById('progressBar');
      var rect = progressBar.getBoundingClientRect();
      var pos = (event.clientX - rect.left) / rect.width;
      video.currentTime = pos * duration;
    }

    function toggleMute() {
      if (!video) return;
      video.muted = !video.muted;
      document.getElementById('muteBtn').textContent = video.muted ? '🔇' : '🔊';
    }

    function setVolume(value) {
      if (!video) return;
      video.volume = value;
      video.muted = value == 0;
      document.getElementById('muteBtn').textContent = value == 0 ? '🔇' : '🔊';
    }

    function setPlaybackRate(rate) {
      if (!video) return;
      video.playbackRate = parseFloat(rate);
    }

    function toggleFullscreen() {
      var wrapper = document.getElementById('videoWrapper');
      if (!document.fullscreenElement) {
        if (wrapper.requestFullscreen) {
          wrapper.requestFullscreen();
        } else if (wrapper.webkitRequestFullscreen) {
          wrapper.webkitRequestFullscreen();
        } else if (wrapper.msRequestFullscreen) {
          wrapper.msRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      }
    }

    document.addEventListener('keydown', function(e) {
      if (!video) return;
      switch(e.key) {
        case ' ':
        case 'k':
          e.preventDefault();
          togglePlay();
          break;
        case 'ArrowLeft':
          e.preventDefault();
          video.currentTime -= 10;
          break;
        case 'ArrowRight':
          e.preventDefault();
          video.currentTime += 10;
          break;
        case 'ArrowUp':
          e.preventDefault();
          video.volume = Math.min(1, video.volume + 0.1);
          document.getElementById('volumeSlider').value = video.volume;
          break;
        case 'ArrowDown':
          e.preventDefault();
          video.volume = Math.max(0, video.volume - 0.1);
          document.getElementById('volumeSlider').value = video.volume;
          break;
        case 'f':
          e.preventDefault();
          toggleFullscreen();
          break;
        case 'm':
          e.preventDefault();
          toggleMute();
          break;
      }
    });

    loadMovie();
  </script>
</body>
</html>
