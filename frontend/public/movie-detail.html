<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电影详情 - 电影推荐系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }
    .header {
      background-color: #000000;
      color: #ffffff;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 24px;
      cursor: pointer;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .back-btn {
      padding: 8px 16px;
      background-color: #ffffff;
      color: #000000;
      border: 2px solid #ffffff;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .back-btn:hover {
      background-color: #000000;
      color: #ffffff;
    }
    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .movie-detail {
      background-color: #ffffff;
      border: 3px solid #000000;
      padding: 30px;
      margin-bottom: 30px;
      display: flex;
      gap: 30px;
    }
    .movie-cover-large {
      width: 280px;
      height: 400px;
      object-fit: cover;
      background-color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999999;
      font-size: 14px;
      border: 2px solid #000000;
      flex-shrink: 0;
    }
    .movie-cover-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .movie-content {
      flex: 1;
    }
    .movie-title {
      font-size: 32px;
      font-weight: bold;
      color: #000000;
      margin-bottom: 20px;
    }
    .movie-meta-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      color: #333333;
    }
    .meta-label {
      font-weight: bold;
      color: #000000;
    }
    .movie-description {
      font-size: 16px;
      line-height: 1.8;
      color: #333333;
      margin-bottom: 25px;
    }
    .rating-section {
      background-color: #f8f8f8;
      border: 2px solid #000000;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .rating-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #000000;
    }
    .avg-rating {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    .avg-rating-value {
      font-size: 36px;
      font-weight: bold;
      color: #ff9800;
    }
    .star-rating {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
    }
    .star {
      font-size: 32px;
      cursor: pointer;
      color: #cccccc;
      transition: color 0.2s;
    }
    .star.active,
    .star:hover {
      color: #ff9800;
    }
    .your-rating {
      font-size: 16px;
      color: #666666;
    }
    .video-section {
      background-color: #ffffff;
      border: 3px solid #000000;
      padding: 30px;
      margin-bottom: 30px;
    }
    .video-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #000000;
    }
    .video-container {
      width: 100%;
      aspect-ratio: 16/9;
      background-color: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      overflow: hidden;
    }
    .video-container video {
      width: 100%;
      height: 100%;
    }
    .no-video {
      color: #ffffff;
      font-size: 18px;
      text-align: center;
    }
    .comments-section {
      background-color: #ffffff;
      border: 3px solid #000000;
      padding: 30px;
    }
    .comments-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #000000;
    }
    .comment-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .comment-item {
      padding: 15px;
      background-color: #f8f8f8;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
    }
    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .comment-user {
      font-weight: bold;
      color: #000000;
    }
    .comment-rating {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #ff9800;
      font-weight: bold;
    }
    .comment-date {
      font-size: 14px;
      color: #999999;
    }
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 18px;
      color: #666666;
    }
    .error-message {
      text-align: center;
      padding: 40px;
      font-size: 18px;
      color: #d32f2f;
    }
    .no-comments {
      text-align: center;
      padding: 40px;
      font-size: 16px;
      color: #666666;
      background-color: #f8f8f8;
      border-radius: 8px;
    }
    .success-message {
      color: #43a047;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 onclick="goBack()">电影推荐系统</h1>
    <div class="user-info">
      <button class="back-btn" onclick="goBack()">返回列表</button>
    </div>
  </div>

  <div class="container">
    <div id="movieDetail">
      <div class="loading">加载中...</div>
    </div>
    
    <div class="video-section">
      <h2 class="video-title">视频播放</h2>
      <div id="videoContainer" class="video-container">
        <div class="no-video">暂无视频资源</div>
      </div>
    </div>

    <div class="comments-section">
      <h2 class="comments-title">用户评分</h2>
      <div id="commentsList" class="comment-list">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    // 后端接口地址
    const API_BASE = `http://${window.location.hostname}:3000/api`;

    // 获取URL参数
    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get('id');

    // 检查是否登录
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser) {
      window.location.href = '/index.html';
    }

    let currentMovie = null;
    let userRating = null;

    // 返回列表
    function goBack() {
      window.location.href = '/user-dashboard.html';
    }

    // 加载电影详情
    async function loadMovieDetail() {
      const container = document.getElementById('movieDetail');
      container.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const response = await fetch(`${API_BASE}/movies/${movieId}`);
        const data = await response.json();

        if (data.success) {
          currentMovie = data.data;
          renderMovieDetail(currentMovie);
          renderVideoPlayer(currentMovie);
          
          // 加载用户评分
          loadUserRating();
        } else {
          container.innerHTML = `<div class="error-message">${data.message || '加载失败'}</div>`;
        }
      } catch (error) {
        console.error('加载电影详情失败:', error);
        container.innerHTML = '<div class="error-message">网络错误，请确保后端服务已启动</div>';
      }
    }

    // 渲染电影详情
    function renderMovieDetail(movie) {
      const container = document.getElementById('movieDetail');
      container.innerHTML = `
        <div class="movie-detail">
          <div class="movie-cover-large">
            ${movie.cover_url 
              ? `<img src="${movie.cover_url}" alt="${movie.title}" onerror="this.parentElement.innerHTML='暂无封面'">`
              : '暂无封面'
            }
          </div>
          <div class="movie-content">
            <h1 class="movie-title">${movie.title}</h1>
            <div class="movie-meta-row">
              <div class="meta-item">
                <span class="meta-label">年份:</span>
                <span>${movie.release_year || '未知'}</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">时长:</span>
                <span>${movie.duration ? movie.duration + ' 分钟' : '未知'}</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">评分:</span>
                <span style="color: #ff9800; font-weight: bold;">★ ${parseFloat(movie.avg_rating).toFixed(1) || '暂无'}</span>
              </div>
            </div>
            <div class="movie-description">
              <strong>简介：</strong>${movie.description || '暂无简介'}
            </div>
            
            <div class="rating-section">
              <h3 class="rating-title">我的评分</h3>
              <div class="avg-rating">
                <span class="avg-rating-value" id="avgRatingDisplay">${parseFloat(movie.avg_rating).toFixed(1) || '0.0'}</span>
                <span style="color: #666;">综合评分</span>
              </div>
              <div class="star-rating" id="starRating">
                ${[1, 2, 3, 4, 5].map(i => `
                  <span class="star" data-rating="${i}" onclick="setRating(${i})">★</span>
                `).join('')}
              </div>
              <div class="your-rating" id="yourRating">
                点击星星进行评分 (1-5分)
              </div>
              <div id="ratingMessage"></div>
            </div>
          </div>
        </div>
      `;
    }

    // 渲染视频播放器
    function renderVideoPlayer(movie) {
      const container = document.getElementById('videoContainer');
      if (movie.video_url) {
        container.innerHTML = `
          <video controls controlslist="nodownload" oncontextmenu="return false;">
            <source src="${movie.video_url}" type="video/mp4">
            您的浏览器不支持视频播放
          </video>
        `;
      } else {
        container.innerHTML = '<div class="no-video">暂无视频资源</div>';
      }
    }

    // 加载用户评分
    async function loadUserRating() {
      try {
        const response = await fetch(`${API_BASE}/movies/${movieId}/user-rating/${currentUser.id}`);
        const data = await response.json();
        
        if (data.success && data.data.rating) {
          userRating = data.data.rating;
          updateStarDisplay(userRating);
          document.getElementById('yourRating').textContent = `我的评分: ${userRating} 分`;
        }
      } catch (error) {
        console.error('加载用户评分失败:', error);
      }
    }

    // 设置评分
    async function setRating(rating) {
      try {
        const response = await fetch(`${API_BASE}/movies/${movieId}/rate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: currentUser.id,
            rating: rating
          })
        });
        const data = await response.json();

        if (data.success) {
          userRating = rating;
          updateStarDisplay(rating);
          document.getElementById('yourRating').textContent = `我的评分: ${rating} 分`;
          document.getElementById('ratingMessage').innerHTML = '<div class="success-message">评分成功！</div>';
          document.getElementById('avgRatingDisplay').textContent = parseFloat(data.data.avgRating).toFixed(1);
          
          // 重新加载评论列表
          loadComments();
          
          setTimeout(() => {
            document.getElementById('ratingMessage').innerHTML = '';
          }, 2000);
        } else {
          alert(data.message || '评分失败');
        }
      } catch (error) {
        console.error('评分失败:', error);
        alert('网络错误，请确保后端服务已启动');
      }
    }

    // 更新星星显示
    function updateStarDisplay(rating) {
      const stars = document.querySelectorAll('#starRating .star');
      stars.forEach(star => {
        const starRating = parseInt(star.dataset.rating);
        if (starRating <= rating) {
          star.classList.add('active');
        } else {
          star.classList.remove('active');
        }
      });
    }

    // 加载评论列表
    async function loadComments() {
      const container = document.getElementById('commentsList');
      container.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const response = await fetch(`${API_BASE}/movies/${movieId}/comments?limit=50`);
        const data = await response.json();

        if (data.success) {
          const { comments } = data.data;
          
          if (comments.length === 0) {
            container.innerHTML = '<div class="no-comments">暂无用户评分，成为第一个评分的人吧！</div>';
          } else {
            renderComments(comments);
          }
        } else {
          container.innerHTML = `<div class="error-message">${data.message || '加载失败'}</div>`;
        }
      } catch (error) {
        console.error('加载评论失败:', error);
        container.innerHTML = '<div class="error-message">网络错误，请确保后端服务已启动</div>';
      }
    }

    // 渲染评论
    function renderComments(comments) {
      const container = document.getElementById('commentsList');
      container.innerHTML = comments.map(comment => {
        const date = new Date(comment.created_at).toLocaleDateString('zh-CN');
        return `
        <div class="comment-item">
          <div class="comment-header">
            <span class="comment-user">${comment.username}</span>
            <span class="comment-rating">★ ${comment.rating}</span>
          </div>
          <div class="comment-date">${date}</div>
        </div>
      `}).join('');
    }

    // 页面加载时加载数据
    loadMovieDetail();
    loadComments();
  </script>
</body>
</html>
