<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电影详情 - 电影推荐系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
    .header { background-color: #000; color: #fff; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 24px; cursor: pointer; }
    .back-btn { padding: 8px 16px; background-color: #fff; color: #000; border: 2px solid #fff; font-weight: bold; cursor: pointer; }
    .back-btn:hover { background-color: #000; color: #fff; }
    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .movie-detail { background: #fff; border: 3px solid #000; padding: 30px; margin-bottom: 30px; display: flex; gap: 30px; }
    .movie-cover-large { width: 280px; height: 400px; background: #e0e0e0; display: flex; align-items: center; justify-content: center; border: 2px solid #000; flex-shrink: 0; }
    .movie-cover-large img { width: 100%; height: 100%; object-fit: cover; }
    .movie-content { flex: 1; }
    .movie-title { font-size: 32px; font-weight: bold; color: #000; margin-bottom: 20px; }
    .movie-meta-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .meta-item { display: flex; align-items: center; gap: 8px; font-size: 16px; }
    .meta-label { font-weight: bold; }
    .movie-description { font-size: 16px; line-height: 1.8; margin-bottom: 25px; }
    .rating-section { background: #f8f8f8; border: 2px solid #000; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .rating-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
    .avg-rating { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
    .avg-rating-value { font-size: 36px; font-weight: bold; color: #ff9800; }
    .star-rating { display: flex; gap: 5px; margin-bottom: 15px; }
    .star { font-size: 32px; cursor: pointer; color: #ccc; transition: color 0.2s; }
    .star.active, .star:hover { color: #ff9800; }
    .your-rating { font-size: 16px; color: #666; }
    .play-section { background: #fff; border: 3px solid #000; padding: 30px; margin-bottom: 30px; text-align: center; }
    .play-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
    .play-btn { padding: 15px 50px; background: #000; color: #fff; border: 3px solid #000; font-size: 20px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; }
    .play-btn:hover { background: #fff; color: #000; }
    .play-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .play-icon { font-size: 24px; }
    .no-video-hint { color: #999; font-size: 16px; margin-top: 15px; display: none; }
    .comments-section { background: #fff; border: 3px solid #000; padding: 30px; }
    .comments-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
    .comment-list { display: flex; flex-direction: column; gap: 15px; }
    .comment-item { padding: 15px; background: #f8f8f8; border: 2px solid #e0e0e0; border-radius: 8px; }
    .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .comment-user { font-weight: bold; }
    .comment-rating { display: flex; align-items: center; gap: 5px; color: #ff9800; font-weight: bold; }
    .comment-date { font-size: 14px; color: #999; }
    .loading { text-align: center; padding: 40px; font-size: 18px; color: #666; }
    .error-message { text-align: center; padding: 40px; font-size: 18px; color: #d32f2f; }
    .no-comments { text-align: center; padding: 40px; font-size: 16px; color: #666; background: #f8f8f8; border-radius: 8px; }
    .success-message { color: #43a047; font-size: 14px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <h1 onclick="goBack()">电影推荐系统</h1>
    <button class="back-btn" onclick="goBack()">返回列表</button>
  </div>

  <div class="container">
    <div id="movieDetail"><div class="loading">加载中...</div></div>
    
    <div class="play-section">
      <h2 class="play-title">开始观看</h2>
      <button class="play-btn" id="playBtn" onclick="goToPlayer()">
        <span class="play-icon">▶</span>播放电影
      </button>
      <div class="no-video-hint" id="noVideoHint">该电影暂无播放资源</div>
    </div>

    <div class="comments-section">
      <h2 class="comments-title">用户评分</h2>
      <div id="commentsList" class="comment-list"><div class="loading">加载中...</div></div>
    </div>
  </div>

  <script>
    const API_BASE = `http://${window.location.hostname}:3000/api`;
    const movieId = new URLSearchParams(window.location.search).get('id');
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    
    if (!currentUser) window.location.href = '/index.html';

    let currentMovie = null;

    function goBack() { window.location.href = '/user-dashboard.html'; }
    function goToPlayer() { if (currentMovie?.video_url) window.location.href = `/movie-player.html?id=${movieId}`; }

    async function loadMovieDetail() {
      const container = document.getElementById('movieDetail');
      try {
        const res = await fetch(`${API_BASE}/movies/${movieId}`);
        const data = await res.json();
        if (data.success) {
          currentMovie = data.data;
          renderMovieDetail(currentMovie);
          document.getElementById('playBtn').disabled = !currentMovie.video_url;
          document.getElementById('noVideoHint').style.display = currentMovie.video_url ? 'none' : 'block';
          loadUserRating();
        } else container.innerHTML = `<div class="error-message">${data.message || '加载失败'}</div>`;
      } catch { container.innerHTML = '<div class="error-message">网络错误，请确保后端服务已启动</div>'; }
    }

    function renderMovieDetail(m) {
      document.getElementById('movieDetail').innerHTML = `
        <div class="movie-detail">
          <div class="movie-cover-large">${m.cover_url ? `<img src="${m.cover_url}" alt="${m.title}" onerror="this.parentElement.innerHTML='暂无封面'">` : '暂无封面'}</div>
          <div class="movie-content">
            <h1 class="movie-title">${m.title}</h1>
            <div class="movie-meta-row">
              <div class="meta-item"><span class="meta-label">年份:</span><span>${m.release_year || '未知'}</span></div>
              <div class="meta-item"><span class="meta-label">时长:</span><span>${m.duration ? m.duration + ' 分钟' : '未知'}</span></div>
              <div class="meta-item"><span class="meta-label">评分:</span><span style="color:#ff9800;font-weight:bold">★ ${parseFloat(m.avg_rating).toFixed(1) || '暂无'}</span></div>
            </div>
            <div class="movie-description"><strong>简介：</strong>${m.description || '暂无简介'}</div>
            <div class="rating-section">
              <h3 class="rating-title">我的评分</h3>
              <div class="avg-rating"><span class="avg-rating-value" id="avgRatingDisplay">${parseFloat(m.avg_rating).toFixed(1) || '0.0'}</span><span style="color:#666">综合评分</span></div>
              <div class="star-rating" id="starRating">
                ${[1,2,3,4,5].map(i => `<span class="star" data-rating="${i}" onclick="setRating(${i})">★</span>`).join('')}
              </div>
              <div class="your-rating" id="yourRating">点击星星进行评分 (1-5分)</div>
              <div id="ratingMessage"></div>
            </div>
          </div>
        </div>`;
    }

    async function loadUserRating() {
      try {
        const res = await fetch(`${API_BASE}/movies/${movieId}/user-rating/${currentUser.id}`);
        const data = await res.json();
        if (data.success && data.data.rating) {
          updateStarDisplay(data.data.rating);
          document.getElementById('yourRating').textContent = `我的评分: ${data.data.rating} 分`;
        }
      } catch {}
    }

    async function setRating(rating) {
      try {
        const res = await fetch(`${API_BASE}/movies/${movieId}/rate`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: currentUser.id, rating })
        });
        const data = await res.json();
        if (data.success) {
          updateStarDisplay(rating);
          document.getElementById('yourRating').textContent = `我的评分: ${rating} 分`;
          document.getElementById('ratingMessage').innerHTML = '<div class="success-message">评分成功！</div>';
          document.getElementById('avgRatingDisplay').textContent = parseFloat(data.data.avgRating).toFixed(1);
          loadComments();
          setTimeout(() => document.getElementById('ratingMessage').innerHTML = '', 2000);
        } else alert(data.message || '评分失败');
      } catch { alert('网络错误，请确保后端服务已启动'); }
    }

    function updateStarDisplay(rating) {
      document.querySelectorAll('#starRating .star').forEach(star => {
        star.classList.toggle('active', parseInt(star.dataset.rating) <= rating);
      });
    }

    async function loadComments() {
      const container = document.getElementById('commentsList');
      try {
        const res = await fetch(`${API_BASE}/movies/${movieId}/comments?limit=50`);
        const data = await res.json();
        if (data.success) {
          if (data.data.comments.length === 0) {
            container.innerHTML = '<div class="no-comments">暂无用户评分，成为第一个评分的人吧！</div>';
          } else {
            container.innerHTML = data.data.comments.map(c => `
              <div class="comment-item">
                <div class="comment-header"><span class="comment-user">${c.username}</span><span class="comment-rating">★ ${c.rating}</span></div>
                <div class="comment-date">${new Date(c.created_at).toLocaleDateString('zh-CN')}</div>
              </div>`).join('');
          }
        } else container.innerHTML = `<div class="error-message">${data.message || '加载失败'}</div>`;
      } catch { container.innerHTML = '<div class="error-message">网络错误，请确保后端服务已启动</div>'; }
    }

    loadMovieDetail();
    loadComments();
  </script>
</body>
</html>
