<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录/注册</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 400px;
      border: 3px solid #000000;
      padding: 40px 30px;
    }
    .tabs {
      display: flex;
      margin-bottom: 30px;
      border-bottom: 3px solid #000000;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      color: #000000;
      background-color: #ffffff;
      border: 3px solid #000000;
      border-bottom: none;
      margin: 0 5px;
      border-radius: 8px 8px 0 0;
    }
    .tab.active {
      background-color: #000000;
      color: #ffffff;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: bold;
      color: #000000;
    }
    input {
      width: 100%;
      padding: 12px 10px;
      border: 3px solid #000000;
      font-size: 16px;
      outline: none;
      background-color: #ffffff;
    }
    input:focus {
      border-width: 4px;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #000000;
      color: #ffffff;
      border: 3px solid #000000;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background-color: #ffffff;
      color: #000000;
    }
    .message {
      margin-top: 15px;
      padding: 10px;
      text-align: center;
      font-weight: bold;
      border: 3px solid #000000;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error {
      background-color: #ffffff;
      color: #000000;
    }
    .success {
      background-color: #000000;
      color: #ffffff;
    }
    .form-content {
      display: none;
    }
    .form-content.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="tabs">
      <div class="tab active" id="loginTab">登录</div>
      <div class="tab" id="registerTab">注册</div>
    </div>
    
    <!-- 登录表单 -->
    <div class="form-content active" id="loginForm">
      <div class="form-group">
        <label for="loginUsername">用户名</label>
        <input type="text" id="loginUsername" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label for="loginPassword">密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码">
      </div>
      <button id="loginBtn">登录</button>
      <div id="loginMessage" class="message"></div>
    </div>

    <!-- 注册表单 -->
    <div class="form-content" id="registerForm">
      <div class="form-group">
        <label for="regUsername">用户名</label>
        <input type="text" id="regUsername" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label for="regPassword">密码</label>
        <input type="password" id="regPassword" placeholder="请输入密码">
      </div>
      <button id="registerBtn">注册</button>
      <div id="regMessage" class="message"></div>
    </div>
  </div>

  <script>
    // 后端接口地址 - 使用当前页面的主机名，避免 Private Network Access (PNA) 限制
    const API_BASE = `http://${window.location.hostname}:3000/api`;

    // 表单切换功能
    document.getElementById('loginTab').addEventListener('click', () => {
      document.getElementById('loginTab').classList.add('active');
      document.getElementById('registerTab').classList.remove('active');
      document.getElementById('loginForm').classList.add('active');
      document.getElementById('registerForm').classList.remove('active');
    });

    document.getElementById('registerTab').addEventListener('click', () => {
      document.getElementById('registerTab').classList.add('active');
      document.getElementById('loginTab').classList.remove('active');
      document.getElementById('registerForm').classList.add('active');
      document.getElementById('loginForm').classList.remove('active');
    });

    // 注册功能
    document.getElementById('registerBtn').addEventListener('click', async () => {
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value.trim();
      const messageDiv = document.getElementById('regMessage');

      if (!username || !password) {
        showMessage(messageDiv, '用户名和密码不能为空', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();

        if (data.success) {
          showMessage(messageDiv, data.message, 'success');
          // 清空表单
          document.getElementById('regUsername').value = '';
          document.getElementById('regPassword').value = '';
        } else {
          showMessage(messageDiv, data.message, 'error');
        }
      } catch (err) {
        showMessage(messageDiv, '网络错误，请确保后端服务已启动', 'error');
        console.error(err);
      }
    });

     // 登录功能
     document.getElementById('loginBtn').addEventListener('click', async () => {
       const username = document.getElementById('loginUsername').value.trim();
       const password = document.getElementById('loginPassword').value.trim();
       const messageDiv = document.getElementById('loginMessage');

       if (!username || !password) {
         showMessage(messageDiv, '用户名和密码不能为空', 'error');
         return;
       }

       try {
         const response = await fetch(`${API_BASE}/login`, {
           method: 'POST',
           headers: { 'Content-Type': 'application/json' },
           body: JSON.stringify({ username, password })
         });
         const data = await response.json();

         if (data.success) {
           showMessage(messageDiv, data.message + '，正在跳转...', 'success');
           // 登录成功后根据用户角色跳转
            setTimeout(() => {
              if (data.data.role_id === 1) {
                // 管理员跳转到用户管理页面
                window.location.href = './user-management.html';
              } else {
                // 普通用户跳转到用户页面
                window.location.href = './user-dashboard.html';
              }
            }, 1000);
           // 保存用户信息到本地存储
           localStorage.setItem('currentUser', JSON.stringify(data.data));
         } else {
           showMessage(messageDiv, data.message, 'error');
         }
       } catch (err) {
         showMessage(messageDiv, '网络错误，请确保后端服务已启动', 'error');
         console.error(err);
       }
     });

    function showMessage(element, text, type) {
      element.textContent = text;
      element.className = `message ${type}`;
      // 3秒后自动清除消息
      setTimeout(() => {
        element.textContent = '';
        element.className = 'message';
      }, 3000);
    }
  </script>
</body>
</html>
