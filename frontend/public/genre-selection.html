<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选择你感兴趣的题材</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 640px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.2);
      padding: 48px 40px;
    }
    .header-icon {
      text-align: center;
      font-size: 52px;
      margin-bottom: 12px;
    }
    h1 {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .genres-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .genre-chip {
      padding: 10px 22px;
      border: 2px solid #e2e8f0;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      color: #475569;
      background: #fff;
      cursor: pointer;
      transition: all 0.25s;
      user-select: none;
    }
    .genre-chip:hover {
      border-color: #4f46e5;
      color: #4f46e5;
      background: #f5f3ff;
      transform: translateY(-2px);
    }
    .genre-chip.selected {
      border-color: #4f46e5;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(79,70,229,0.3);
      transform: translateY(-2px);
    }
    .genre-chip.selected:hover {
      opacity: 0.9;
    }
    .genre-emoji {
      margin-right: 4px;
    }
    .selection-info {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
    }
    .selection-info span {
      color: #4f46e5;
      font-weight: 700;
    }
    .btn-container {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .btn-submit {
      padding: 14px 48px;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 4px 16px rgba(79,70,229,0.3);
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(79,70,229,0.4);
    }
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-skip {
      padding: 14px 32px;
      background: transparent;
      color: #94a3b8;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
    }
    .btn-skip:hover {
      border-color: #94a3b8;
      color: #64748b;
    }
    .message {
      text-align: center;
      margin-top: 16px;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .message.error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }
    .message.success {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.8);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 12px;
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #e2e8f0;
      border-top: 4px solid #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: #64748b; font-weight: 500; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-icon">🎬</div>
    <h1>选择你感兴趣的电影题材</h1>
    <p class="subtitle">选几个你喜欢的题材，我们将为你推荐更精准的电影<br>可以多选，也可以先跳过，之后随时调整</p>

    <div class="genres-grid" id="genresGrid">
      <div style="text-align:center;width:100%;color:#94a3b8;padding:20px;">加载中...</div>
    </div>

    <div class="selection-info" id="selectionInfo">
      已选择 <span id="selectedCount">0</span> 个题材
    </div>

    <div class="btn-container">
      <button class="btn-skip" id="btnSkip">稍后再说</button>
      <button class="btn-submit" id="btnSubmit">开始探索 →</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">正在保存你的偏好...</div>
  </div>

  <script>
    const API_BASE = `http://${window.location.hostname}:3000/api`;

    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser) {
      window.location.href = '/index.html';
    }

    document.getElementById('usernameDisplay') && (document.getElementById('usernameDisplay').textContent = currentUser.username);

    const selectedGenres = new Set();

    async function loadGenres() {
      const grid = document.getElementById('genresGrid');
      try {
        const response = await fetch(`${API_BASE}/genres`);
        const data = await response.json();
        if (data.success && data.data.length > 0) {
          renderGenres(data.data);
        } else {
          grid.innerHTML = '<div style="text-align:center;width:100%;color:#94a3b8;padding:20px;">暂无题材数据</div>';
        }
      } catch (error) {
        console.error('加载题材失败:', error);
        grid.innerHTML = '<div style="text-align:center;width:100%;color:#ef4444;padding:20px;">加载失败，请刷新重试</div>';
      }
    }

    const GENRE_EMOJIS = {
      '动作': '💥', '冒险': '🏔️', '动画': '🎨', '喜剧': '😂',
      '犯罪': '🕵️', '纪录片': '📽️', '剧情': '🎭', '家庭': '👨‍👩‍👧‍👦',
      '奇幻': '🧙', '历史': '📜', '恐怖': '👻', '音乐': '🎵',
      '悬疑': '🔍', '爱情': '💕', '科幻': '🚀', '灾难': '🌪️',
      '惊悚': '😱', '战争': '⚔️', '西部': '🤠', '黑色电影': '🖤',
      '儿童': '🧒', '真人秀': '📺', '短片': '⏱️', '运动': '🏆',
      '神秘': '🔮', '传记': '📖', '歌舞': '💃',
      'Film-Noir': '🖤', 'IMAX': '📐', 'Sci-Fi': '🚀',
      'film-noir': '🖤', 'sci-fi': '🚀'
    };

    function renderGenres(genres) {
      const grid = document.getElementById('genresGrid');
      grid.innerHTML = genres.map(g => {
        const emoji = GENRE_EMOJIS[g.name] || GENRE_EMOJIS[g.code] || '🎞️';
        return `
          <div class="genre-chip" data-genre-id="${g.id}" data-genre-name="${g.name}" onclick="toggleGenre(this, ${g.id})">
            <span class="genre-emoji">${emoji}</span>${g.name}
          </div>
        `;
      }).join('');
    }

    function toggleGenre(chip, genreId) {
      if (selectedGenres.has(genreId)) {
        selectedGenres.delete(genreId);
        chip.classList.remove('selected');
      } else {
        selectedGenres.add(genreId);
        chip.classList.add('selected');
      }
      document.getElementById('selectedCount').textContent = selectedGenres.size;
    }

    async function savePreferences() {
      const btn = document.getElementById('btnSubmit');
      const loading = document.getElementById('loadingOverlay');
      const messageDiv = document.getElementById('message');

      btn.disabled = true;
      loading.classList.add('active');
      messageDiv.className = 'message';

      try {
        const genreIdsInt = Array.from(selectedGenres).map(id => parseInt(id, 10));
        console.log('[题材选择] 保存偏好, userId:', currentUser.id, 'genreIds:', genreIdsInt);

        const response = await fetch(`${API_BASE}/users/preferences/genres`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: currentUser.id,
            genreIds: genreIdsInt
          })
        });
        const data = await response.json();

        if (data.success) {
          messageDiv.className = 'message success';
          messageDiv.textContent = data.message + ' 正在跳转...';

          const updatedUser = { ...currentUser, is_first_login: false };
          localStorage.setItem('currentUser', JSON.stringify(updatedUser));

          setTimeout(() => {
            window.location.href = '/user-dashboard.html';
          }, 1000);
        } else {
          messageDiv.className = 'message error';
          messageDiv.textContent = data.message || '保存失败，请重试';
          btn.disabled = false;
        }
      } catch (error) {
        console.error('保存偏好失败:', error);
        messageDiv.className = 'message error';
        messageDiv.textContent = '网络错误，请重试';
        btn.disabled = false;
      } finally {
        loading.classList.remove('active');
      }
    }

    function skipSelection() {
      const updatedUser = { ...currentUser, is_first_login: false };
      localStorage.setItem('currentUser', JSON.stringify(updatedUser));
      window.location.href = '/user-dashboard.html';
    }

    document.getElementById('btnSubmit').addEventListener('click', savePreferences);
    document.getElementById('btnSkip').addEventListener('click', skipSelection);

    loadGenres();
  </script>
</body>
</html>
